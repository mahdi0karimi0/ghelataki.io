<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسابقه دوچرخه‌سواری نئونی</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        #character-select {
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #00f2ff;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            transition: opacity 0.5s;
            max-width: 95%;
            width: 500px;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #fff;
            font-size: 1.8rem;
        }
        
        .char-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .char-card {
            background: #1a1a2e;
            border: 2px solid #333;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100px;
        }
        
        .char-card:hover,
        .char-card.selected {
            transform: translateY(-5px);
            box-shadow: 0 0 15px currentColor;
            border-color: currentColor;
        }
        
        .char-name {
            color: #fff;
            font-size: 0.9rem;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .char-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto;
            object-fit: cover;
            box-shadow: 0 0 10px currentColor;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 0.7rem;
        }
        
        #start-btn {
            background: linear-gradient(45deg, #00f2ff, #0066ff);
            border: none;
            padding: 12px 40px;
            color: white;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            font-family: inherit;
            pointer-events: auto;
        }
        
        #start-btn:active {
            transform: scale(0.95);
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px #fff;
            pointer-events: none;
            display: none;
            z-index: 100;
        }

        /* 🚀 نمایشگر سرعت */
        #speed-display {
            position: absolute;
            top: 20px;
            right: 80px;
            color: #ffaa00;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px #ffaa00;
            pointer-events: none;
            display: none;
            z-index: 100;
        }

        /* ⚡ اعلان افزایش سرعت */
        #speed-up-notify {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffaa00;
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 20px #ffaa00;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            transition: opacity 0.3s;
        }

        #speed-up-notify.show {
            animation: speedUpFlash 1s ease-out;
        }

        @keyframes speedUpFlash {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
        
        #game-over {
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ff0055;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3);
            max-width: 90%;
            width: 350px;
        }
        
        #game-over h2 {
            color: #ff0055;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #ff0055;
            animation: shake 0.5s ease-in-out;
        }
        
        #final-score {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            pointer-events: none;
        }
        
        #quick-restart {
            background: linear-gradient(45deg, #ff0055, #ff66cc);
            border: none;
            padding: 15px 35px;
            color: white;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
            font-family: inherit;
            margin-top: 15px;
            pointer-events: auto;
            display: block;
            animation: popIn 0.3s ease-out;
            transition: transform 0.1s;
        }
        
        #quick-restart:active {
            transform: scale(0.95);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .screen-shake {
            animation: screenShake 0.3s ease-in-out;
        }
        
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -5px); }
            20% { transform: translate(5px, 5px); }
            30% { transform: translate(-5px, 5px); }
            40% { transform: translate(5px, -5px); }
            50% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            70% { transform: translate(-5px, 5px); }
            80% { transform: translate(5px, -5px); }
            90% { transform: translate(-5px, -5px); }
        }

        /* 🔊 دکمه کنترل صدا */
        #sound-control {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00f2ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s;
            pointer-events: auto;
        }

        #sound-control:hover {
            background: rgba(0, 242, 255, 0.3);
            transform: scale(1.1);
        }

        #sound-control.muted {
            border-color: #ff0055;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>
    <div id="score-display">امتیاز: 0</div>
    <div id="speed-display">سرعت: 1x</div>
    <div id="speed-up-notify">⚡ سرعت!</div>

    <!-- 🔊 دکمه کنترل صدا -->
    <button id="sound-control" onclick="toggleSound()" title="قطع/وصل صدا">🔊</button>

    <!-- 🎵 موسیقی پس‌زمینه -->
    <audio id="bg-music" loop preload="auto">
        <source src="bg-music.mp3" type="audio/mpeg">
    </audio>

    <!-- 🔊 صدای تصادف -->
    <audio id="crash-sound" preload="auto">
        <source src="crash.mp3" type="audio/mpeg">
    </audio>

    <!-- منوی انتخاب شخصیت -->
    <div class="ui-layer" id="menu-layer">
        <div id="character-select">
            <h1>قهرمان خود را انتخاب کنید</h1>
            <div class="char-container">
                <!-- امیرمحمد -->
                <div class="char-card selected" onclick="selectChar('amir')" style="color: #00f2ff;">
                    <div class="char-icon" id="amir-icon">در حال بارگیری...</div>
                    <div class="char-name">امیرمحمد</div>
                </div>
                <!-- مهدی -->
                <div class="char-card" onclick="selectChar('mahdi')" style="color: #00ff66;">
                    <div class="char-icon" id="mahdi-icon">در حال بارگیری...</div>
                    <div class="char-name">مهدی</div>
                </div>
                <!-- امیررضا -->
                <div class="char-card" onclick="selectChar('amirreza')" style="color: #ff0055;">
                    <div class="char-icon" id="amirreza-icon">در حال بارگیری...</div>
                    <div class="char-name">امیررضا</div>
                </div>
                <!-- پژو -->
                <div class="char-card" onclick="selectChar('pejoo')" style="color: #aa00ff;">
                    <div class="char-icon" id="pejoo-icon">در حال بارگیری...</div>
                    <div class="char-name">پژو</div>
                </div>
            </div>
            <button id="start-btn" onclick="startGame()">شروع مسابقه</button>
        </div>
    </div>

    <!-- صفحه باخت -->
    <div class="ui-layer" id="game-over-layer" style="display: none;">
        <div id="game-over">
            <h2>تصادف کردی!</h2>
            <p id="final-score">امتیاز نهایی: 0</p>
            <button id="quick-restart" onclick="quickRestart()">بازی مجدد فوری</button>
        </div>
    </div>

    <div class="controls-hint">برای حرکت به چپ یا راست ضربه بزنید</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bg-music');
        const crashSound = document.getElementById('crash-sound');
        const soundControl = document.getElementById('sound-control');
        const speedDisplay = document.getElementById('speed-display');
        const speedUpNotify = document.getElementById('speed-up-notify');

        let width, height;
        let gameRunning = false;
        let score = 0;
        let speed = 5;
        let baseSpeed = 5;
        let speedLevel = 1;
        let frame = 0;
        let animationId;
        let selectedCharKey = 'amir';
        let soundEnabled = true;
        let lastSpeedUpFrame = 0;

        // آماده‌سازی عکس‌ها
        const charImages = {
            amir: new Image(),
            mahdi: new Image(),
            amirreza: new Image(),
            pejoo: new Image()
        };

        charImages.amir.src = 'amir.jpg';
        charImages.mahdi.src = 'mahdi.jpg';
        charImages.amirreza.src = 'amirreza.jpg';
        charImages.pejoo.src = 'pejoo.jpg';

        // بارگیری عکس‌ها
        Object.keys(charImages).forEach(key => {
            charImages[key].onload = () => {
                const icon = document.getElementById(`${key}-icon`);
                if (icon) {
                    icon.innerHTML = '';
                    icon.style.background = 'none';
                    icon.style.backgroundImage = `url(${charImages[key].src})`;
                    icon.style.backgroundSize = 'cover';
                    icon.style.backgroundPosition = 'center';
                }
            };
            charImages[key].onerror = () => {
                const icon = document.getElementById(`${key}-icon`);
                if (icon) {
                    icon.innerHTML = '🚴';
                    icon.style.color = '#ff0055';
                    icon.style.fontSize = '2rem';
                }
            };
        });

        // تنظیمات شخصیت‌ها
        const characters = {
            'amir': { name: 'امیرمحمد', color: '#00f2ff' },
            'mahdi': { name: 'مهدی', color: '#00ff66' },
            'amirreza': { name: 'امیررضا', color: '#ff0055' },
            'pejoo': { name: 'پژو', color: '#aa00ff' }
        };

        // تنظیمات بازیکن
        const player = {
            lane: 1,
            x: 0,
            y: 0,
            width: 80,
            height: 80,
            targetX: 0,
            color: characters[selectedCharKey].color
        };

        let obstacles = [];
        let particles = [];
        let shockwave = null;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            player.y = height - 150;
            updatePlayerTargetX();
            player.x = player.targetX;
        }
        window.addEventListener('resize', resize);
        resize();

        function selectChar(key) {
            selectedCharKey = key;
            player.color = characters[key].color;

            document.querySelectorAll('.char-card').forEach(card => {
                card.classList.remove('selected');
                card.style.borderColor = '#333';
                card.style.boxShadow = 'none';
            });
            
            const selectedCard = event.currentTarget;
            selectedCard.classList.add('selected');
            selectedCard.style.borderColor = characters[key].color;
            selectedCard.style.boxShadow = `0 0 15px ${characters[key].color}`;
        }

        // 🔊 کنترل قطع/وصل صدا
        function toggleSound() {
            soundEnabled = !soundEnabled;
            
            if (soundEnabled) {
                soundControl.innerHTML = '🔊';
                soundControl.classList.remove('muted');
                if (gameRunning) {
                    bgMusic.volume = 0.3;
                    bgMusic.play().catch(e => console.log(e));
                }
            } else {
                soundControl.innerHTML = '🔇';
                soundControl.classList.add('muted');
                bgMusic.pause();
            }
        }

        // 🎵 شروع موسیقی پس‌زمینه
        function startBackgroundMusic() {
            if (soundEnabled) {
                bgMusic.volume = 0.3;
                bgMusic.loop = true;
                bgMusic.play().catch(e => {
                    console.log('پخش موسیقی نیاز به تعامل کاربر دارد:', e);
                });
            }
        }

        // ⏹️ توقف موسیقی پس‌زمینه
        function stopBackgroundMusic() {
            bgMusic.pause();
            bgMusic.currentTime = 0;
        }

        // 🚀 افزایش سرعت بازی
        function increaseSpeed() {
            const now = frame;
            
            // هر 200 فریم سرعت افزایش می‌یابد
            if (now - lastSpeedUpFrame >= 200 && speedLevel < 10) {
                speed += 0.8;
                speedLevel++;
                lastSpeedUpFrame = now;
                
                // نمایش اعلان افزایش سرعت
                speedDisplay.innerText = `سرعت: ${speedLevel}x`;
                speedUpNotify.classList.remove('show');
                void speedUpNotify.offsetWidth; // ریست انیمیشن
                speedUpNotify.classList.add('show');
                
                // تغییر رنگ موسیقی (اگر پشتیبانی شود)
                if (soundEnabled && bgMusic.playbackRate) {
                    bgMusic.playbackRate = Math.min(1 + (speedLevel - 1) * 0.1, 2);
                }
            }
        }

        function startGame() {
            bgMusic.load();
            crashSound.load();
            startBackgroundMusic();
            
            document.getElementById('menu-layer').style.display = 'none';
            document.getElementById('score-display').style.display = 'block';
            speedDisplay.style.display = 'block';
            gameRunning = true;
            score = 0;
            speed = baseSpeed;
            speedLevel = 1;
            frame = 0;
            lastSpeedUpFrame = 0;
            obstacles = [];
            particles = [];
            shockwave = null;
            
            player.lane = 1;
            updatePlayerTargetX();
            player.x = player.targetX;
            
            speedDisplay.innerText = `سرعت: ${speedLevel}x`;
            
            animate();
        }

        // بازی مجدد فوری
        function quickRestart() {
            cancelAnimationFrame(animationId);
            document.getElementById('game-over-layer').style.display = 'none';
            document.body.classList.remove('screen-shake');
            
            startBackgroundMusic();
            
            gameRunning = true;
            score = 0;
            speed = baseSpeed;
            speedLevel = 1;
            frame = 0;
            lastSpeedUpFrame = 0;
            obstacles = [];
            particles = [];
            shockwave = null;
            player.lane = 1;
            player.color = characters[selectedCharKey].color;
            updatePlayerTargetX();
            player.x = player.targetX;
            const scoreDisplay = document.getElementById('score-display');
            scoreDisplay.style.display = 'block';
            speedDisplay.style.display = 'block';
            speedDisplay.innerText = `سرعت: ${speedLevel}x`;
            scoreDisplay.innerText = `امتیاز: 0`;
            animate();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            stopBackgroundMusic();
            
            if (soundEnabled) {
                try {
                    crashSound.currentTime = 0;
                    crashSound.volume = 0.5;
                    crashSound.play().catch(e => console.log('صدا پخش نشد:', e));
                } catch(e) {
                    console.log('خطا در پخش صدا:', e);
                }
            }
            
            document.body.classList.add('screen-shake');
            setTimeout(() => {
                document.body.classList.remove('screen-shake');
            }, 500);
            
            document.getElementById('game-over-layer').style.display = 'flex';
            document.getElementById('final-score').innerText = `امتیاز نهایی: ${Math.floor(score)} | سرعت: ${speedLevel}x`;
            
            createShatterEffect(player.x, player.y, characters[selectedCharKey].color);
            draw();
        }

        function moveLeft() {
            if (player.lane > 0) player.lane--;
            updatePlayerTargetX();
        }

        function moveRight() {
            if (player.lane < 2) player.lane++;
            updatePlayerTargetX();
        }

        function updatePlayerTargetX() {
            const laneWidth = width / 3;
            player.targetX = (player.lane * laneWidth) + (laneWidth / 2);
        }

        // کنترل‌های لمسی
        window.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < width / 2) moveLeft();
            else moveRight();
        }, { passive: false });

        // کنترل‌های کیبورد
        window.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
            if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
        });

        // کلاس موانع
        class Obstacle {
            constructor() {
                const laneWidth = width / 3;
                this.lane = Math.floor(Math.random() * 3);
                this.x = (this.lane * laneWidth) + (laneWidth / 2);
                this.y = -100;
                this.width = 50;
                this.height = 50;
                this.color = '#ffaa00';
            }

            update() {
                this.y += speed;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                if (ctx.roundRect) {
                    ctx.roundRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height, 10);
                } else {
                    ctx.rect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                }
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // 💥 کلاس ذرات خرد شدن کاراکتر
        class ShatterParticle {
            constructor(x, y, color, isPlayerPiece = false) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.isPlayerPiece = isPlayerPiece;
                
                if (isPlayerPiece) {
                    this.size = Math.random() * 15 + 8;
                    this.speedX = (Math.random() - 0.5) * 20;
                    this.speedY = (Math.random() - 0.5) * 20;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.5;
                } else {
                    this.size = Math.random() * 5 + 2;
                    this.speedX = (Math.random() - 0.5) * 15;
                    this.speedY = (Math.random() - 0.5) * 15;
                    this.rotation = 0;
                    this.rotationSpeed = 0;
                }
                
                this.life = 1;
                this.decay = isPlayerPiece ? 0.008 + Math.random() * 0.005 : 0.015 + Math.random() * 0.01;
                this.gravity = 0.3;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.speedX *= 0.98;
                this.rotation += this.rotationSpeed;
                this.life -= this.decay;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                if (this.isPlayerPiece) {
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(this.size / 2, this.size / 2);
                    ctx.lineTo(-this.size / 2, this.size / 2);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }

        // 💥 موج ضربه
        class Shockwave {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = 1;
                this.maxRadius = 300;
                this.speed = 15;
                this.opacity = 1;
            }
            
            update() {
                this.radius += this.speed;
                this.opacity = 1 - (this.radius / this.maxRadius);
            }
            
            draw() {
                if (this.opacity <= 0) return;
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 5;
                ctx.globalAlpha = this.opacity;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.stroke();
                ctx.restore();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }

        function createShatterEffect(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new ShatterParticle(x, y, color, true));
            }
            for (let i = 0; i < 50; i++) {
                particles.push(new ShatterParticle(x, y, color, false));
            }
            shockwave = new Shockwave(x, y, color);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fillRect(0, 0, width, height);
        }

        function drawRoad() {
            const laneWidth = width / 3;

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            ctx.lineDashOffset = -frame * speed;

            for (let i = 1; i < 3; i++) {
                const x = i * laneWidth;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        function drawPlayer() {
            player.x += (player.targetX - player.x) * 0.2;

            const img = charImages[selectedCharKey];
            if (img && img.complete && img.naturalWidth !== 0) {
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = player.color;
                ctx.drawImage(
                    img,
                    player.x - player.width / 2,
                    player.y - player.height / 2,
                    player.width,
                    player.height
                );
                ctx.restore();
            } else {
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = player.color;
                ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.width / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🚴', player.x, player.y);
                ctx.restore();
            }
        }

        function checkCollision(obs) {
            const dx = Math.abs(player.x - obs.x);
            const dy = Math.abs(player.y - obs.y);
            return (dx < (player.width / 2 + obs.width / 2 - 15) && 
                    dy < (player.height / 2 + obs.height / 2 - 15));
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            drawRoad();
            obstacles.forEach(obs => obs.draw());
            if (gameRunning) drawPlayer();
            particles.forEach(p => p.draw());
            if (shockwave) shockwave.draw();
        }

        function animate() {
            if (!gameRunning && particles.length === 0 && (!shockwave || shockwave.opacity <= 0)) return;

            ctx.clearRect(0, 0, width, height);
            drawRoad();

            if (gameRunning) {
                // 🚀 افزایش سرعت بازی
                increaseSpeed();
                
                // تولید موانع (با افزایش سرعت، موانع بیشتر می‌شوند)
                const obstacleInterval = Math.max(20, 60 - speedLevel * 5);
                if (frame % obstacleInterval === 0) {
                    obstacles.push(new Obstacle());
                    score += 10;
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obs = obstacles[i];
                    obs.update();
                    obs.draw();

                    if (checkCollision(obs)) {
                        gameOver();
                        return;
                    }

                    if (obs.y > height + 100) {
                        obstacles.splice(i, 1);
                        score += 2;
                    }
                }

                drawPlayer();
                score += 0.15 * speedLevel;
                document.getElementById('score-display').innerText = `امتیاز: ${Math.floor(score)}`;
                frame++;
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            if (shockwave) {
                shockwave.update();
                shockwave.draw();
                if (shockwave.opacity <= 0) shockwave = null;
            }

            if (gameRunning || particles.length > 0 || shockwave) {
                animationId = requestAnimationFrame(animate);
            }
        }

        resize();
        drawRoad();
        drawPlayer();
    </script>
</body>

</html>
